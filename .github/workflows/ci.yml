name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/flowstate/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: python -m pytest tests/ -v --cov=flowstate --cov-report=term-missing

  rust-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            flowstate-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('flowstate-core/Cargo.lock', 'flowstate-core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests (no Python)
        working-directory: flowstate-core
        run: cargo test --no-default-features --verbose

      - name: Check formatting
        working-directory: flowstate-core
        run: cargo fmt -- --check
        continue-on-error: true

      - name: Clippy lints
        working-directory: flowstate-core
        run: cargo clippy --no-default-features -- -D warnings
        continue-on-error: true

  rust-bench:
    runs-on: ubuntu-latest
    needs: rust-test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            flowstate-core/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('flowstate-core/Cargo.lock', 'flowstate-core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Run Criterion benchmarks
        working-directory: flowstate-core
        run: cargo bench --no-default-features 2>&1 | tee bench_output.txt

      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: criterion-benchmarks
          path: |
            flowstate-core/bench_output.txt
            flowstate-core/target/criterion/

  integration-test:
    runs-on: ubuntu-latest
    needs: [python-test, rust-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install maturin
        run: .venv/bin/pip install maturin

      - name: Build Rust extension
        working-directory: flowstate-core
        run: ../.venv/bin/maturin develop --release

      - name: Install Python dependencies
        run: .venv/bin/pip install -e ".[dev]"

      - name: Run integration tests
        run: .venv/bin/python -m pytest tests/test_integration.py -v

      - name: Run Python benchmarks
        run: .venv/bin/python benchmarks/bench_full_suite.py --json benchmark_results.json
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-benchmarks
          path: benchmark_results.json
